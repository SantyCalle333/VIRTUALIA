<h2>{{ titulo }}</h2>

  <!-- 
    [DOC] Uso del bloque '@if' con el Async Pipe ('| async') y un alias ('as cursos').
    Esto crea una ÚNICA suscripción segura a Firebase, desempaqueta la respuesta y la guarda en 'cursos'.
    Sin este alias, llamar 'cursos$ | async' repetidas veces dentro del ciclo for volvería loco a Firebase,
    causando el temido error de pila llena ("Maximum call stack size exceeded").
  -->
  @if (cursos$ | async; as cursos) {
    @if (cursos.length === 0) {
      <p style="color: #999; font-style: italic;">No hay cursos agregados.</p>
    } @else {
      <ul>
        @for (curso of cursos; track $index) {
          <li style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
            <span>{{ curso.nombre }}</span>
            <button (click)="eliminarCurso(curso)" style="background: #ef4444; font-size: 0.8rem; padding: 0.2rem 0.5rem;">
              Eliminar
            </button>
          </li>
        }
      </ul>
    }
  }

<div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
  <input type="text" [(ngModel)]="nuevoCurso" placeholder="Agregar nuevo curso..." />
  <button (click)="agregarCurso()">Agregar</button>
</div>
