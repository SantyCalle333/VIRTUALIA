<div class="dashboard-layout">
  <!-- Barra de Navegación Superior -->
  <header class="dashboard-header">
    <div class="brand">
      <img src="assets/img/angular-logo.png" alt="Angular Logo" class="brand-logo" />
      <span class="brand-name">{{ nombreProyecto }}</span>
    </div>
    
    <div class="header-actions">
      <div class="user-profile">
        <div class="avatar">{{ alumno.charAt(0) }}</div>
        <span class="user-name">{{ alumno }}</span>
      </div>
      <button class="btn-logout" (click)="cerrarSesion()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main class="dashboard-content">
    <div class="welcome-banner">
      <div class="banner-text">
        <h1>¡Hola, {{ alumno }}!</h1>
        <p>{{ descripcionProyecto }}</p>
      </div>
      <div class="banner-actions">
        @if (!ocultar_videojuegos) {
          <button class="btn-secondary" (click)="ocultarVideojuegos(true)">
            Ocultar Videojuegos
          </button>
        } @else {
          <button class="btn-primary" (click)="mostrarVideojuegos(false)">
            Mostrar Videojuegos
          </button>
        }
      </div>
    </div>

    <!-- Grid de Componentes (Tarjetas de la SPA) -->
    <div class="widgets-grid">
      @if (!ocultar_videojuegos) {
        <section class="widget-card">
          <app-videojuegos></app-videojuegos>
        </section>
      }

      <section class="widget-card">
        <app-zapatillas-core></app-zapatillas-core>
      </section>

      <section class="widget-card">
        <app-cursos></app-cursos>
      </section>
    </div>
  </main>
</div>
