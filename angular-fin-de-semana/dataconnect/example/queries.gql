mutation CreateEvent($title: String!, $eventDate: Timestamp!, $description: String, $location: String) @auth(level: USER) {
  event_insert(data: {
    title: $title,
    eventDate: $eventDate,
    description: $description,
    location: $location,
    creatorId_expr: "auth.uid"
  })
}

mutation JoinEvent($eventId: UUID!) @auth(level: USER) {
  participant_insert(data: {
    eventId: $eventId,
    userId_expr: "auth.uid",
    status: "GOING"
  })
}

query ListMyEvents @auth(level: USER) {
  events(where: { creatorId: { eq_expr: "auth.uid" } }) {
    id
    title
    eventDate
    description
    location
  }
}

mutation VoteOnPollOption($pollOptionId: UUID!) @auth(level: USER) {
  vote_insert(data: {
    pollOptionId: $pollOptionId,
    userId_expr: "auth.uid"
  })
}